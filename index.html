
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sia-Smile ご予約フォーム 改良版</title>
<style>
:root{--bg:#f7f3f1;--card:#fffdfb;--pink:#c98a96;--pink-soft:#f4e4e7;--brown:#8b5e52;--text:#3d312d;--muted:#746762;--line:#eadddd;--error:#b94b55;--error-bg:#fff0f2}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#f7f3f1 0%,#fff9f7 100%);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--text);line-height:1.7}
.app{width:min(100%,520px);margin:0 auto;min-height:100vh;padding:22px 18px 34px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.brand{font-weight:700;font-size:18px}.pill{font-size:13px;color:var(--brown);background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 12px}
.card{background:rgba(255,253,251,.94);border:1px solid rgba(234,221,221,.9);border-radius:28px;padding:26px 22px;box-shadow:0 14px 34px rgba(139,94,82,.10)}
h1{margin:0 0 18px;font-size:24px;font-weight:600;line-height:1.45}.question-title{font-size:21px;font-weight:700;line-height:1.55;margin-bottom:12px}
p{margin:0 0 14px;color:var(--muted);font-size:15px}.category{margin-top:20px;margin-bottom:8px;font-weight:700;font-size:15px}
.option{display:flex;align-items:center;gap:13px;padding:8px 6px;margin:4px 0;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;user-select:none}
.option:hover{background:rgba(244,228,231,.45)}.option.selected{background:rgba(244,228,231,.85);color:var(--brown)}
.box{width:18px;height:18px;border:1.8px solid #a19693;border-radius:4px;flex:0 0 auto;background:#fff;display:flex;align-items:center;justify-content:center}
.option.selected .box{background:var(--pink);border-color:var(--pink)}.option.selected .box:after{content:"✓";color:#fff;font-size:13px;font-weight:700}
input[type=text],input[type=tel],input[type=date],textarea{width:100%;border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px;font-size:16px;font-family:inherit;color:var(--text)}
textarea{min-height:92px;resize:vertical}.row-gap{height:12px}.buttons{display:flex;gap:12px;margin-top:24px}
button{border:none;border-radius:999px;font-family:inherit;font-weight:700;font-size:16px;padding:14px 18px;cursor:pointer}
.primary{flex:1;background:var(--pink);color:#fff;box-shadow:0 8px 18px rgba(201,138,150,.28)}.secondary{background:#fff;color:var(--brown);border:1px solid var(--line)}
.summary{white-space:pre-wrap;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;font-size:14px;color:var(--text);max-height:320px;overflow:auto}
.error{background:var(--error-bg);color:var(--error);border:1px solid #f0c8cd;border-radius:16px;padding:12px 14px;font-size:14px;margin:0 0 16px;font-weight:600}
.complete-icon{font-size:34px;margin-bottom:10px}
</style>
</head>
<body>
<div class="app"><div class="top"><div class="brand">🌿 ご予約フォーム</div><div class="pill" id="stepPill">はじめに</div></div><div class="card" id="screen"></div></div>
<script>
const data={reserveType:"",dates:[{date:"",time:[]},{date:"",time:[]},{date:"",time:[]}],openTime:[],detailTime:"",name:"",phone:"",concerns:[],source:"",sourceOther:"",note:""};
let page=0,errorMessage="";
const screens=[intro,stepReserve,stepPersonal,stepCondition,confirm,complete];

function setPill(){const p=document.getElementById("stepPill");p.textContent=page===0?"はじめに":page===1?"STEP 1/3":page===2?"STEP 2/3":page===3?"STEP 3/3":page===4?"確認":"送信完了"}
function render(){setPill();document.getElementById("screen").innerHTML=screens[page]();window.scrollTo({top:0,behavior:"smooth"})}
function showError(m){errorMessage=m;render()}function errorHtml(){return errorMessage?`<div class="error">${errorMessage}</div>`:""}
function next(){errorMessage="";if(page===1&&!validateReserve())return;if(page===2&&!validatePersonal())return;page=Math.min(page+1,screens.length-1);render()}
function back(){errorMessage="";page=Math.max(page-1,0);render()}
function toggleArray(n,v){const a=data[n];const i=a.indexOf(v);if(i>=0)a.splice(i,1);else a.push(v);render()}
function toggleDateTime(i,v){const a=data.dates[i].time;const x=a.indexOf(v);if(x>=0)a.splice(x,1);else a.push(v);render()}
function setDate(i,v){data.dates[i].date=v}
function checkbox(n,l){const s=data[n].includes(l)?"selected":"";return `<div class="option ${s}" onclick="toggleArray('${n}','${l}')"><span class="box"></span><span>${l}</span></div>`}
function radio(n,l){const s=data[n]===l?"selected":"";return `<div class="option ${s}" onclick="data.${n}='${l}';errorMessage='';render();"><span class="box"></span><span>${l}</span></div>`}
function dateTimeOption(i,l){const s=data.dates[i].time.includes(l)?"selected":"";return `<div class="option ${s}" onclick="toggleDateTime(${i},'${l}')"><span class="box"></span><span>${l}</span></div>`}
function sourceRadio(l){const s=data.source===l?"selected":"";return `<div class="option ${s}" onclick="data.source='${l}';render();"><span class="box"></span><span>${l}</span></div>`}

function intro(){return `<h1>🌿 ご予約のご希望ありがとうございます</h1><p>現在のお身体の状態について、当てはまるものを選択してください😊</p><p>ご回答いただいた内容をもとに、当日のご案内をスムーズに行わせていただきます。</p><div class="buttons"><button class="primary" onclick="next()">入力をはじめる</button></div>`}

function validateReserve(){
 if(!data.reserveType){showError("予約日について「希望あり」または「最短日希望」を選択してください。");return false}
 if(data.reserveType==="希望あり"){
  if(!data.dates[0].date){showError("第1希望の日にちを選択してください。");return false}
  if(data.dates[0].time.length===0){showError("第1希望の時間帯を選択してください。");return false}
 }
 if(data.reserveType==="最短日希望" && data.openTime.length===0){showError("ご都合のつきやすい時間帯を選択してください。");return false}
 return true
}
function validatePersonal(){
 if(!data.name.trim()){showError("お名前を入力してください。");return false}
 if(!data.phone.trim()){showError("電話番号を入力してください。");return false}
 return true
}
function dateBlock(i){return `<div class="category">【第${i+1}希望】${i===0?" 必須":" 任意"}</div><input type="date" value="${data.dates[i].date}" onchange="setDate(${i},this.value)"><div class="category">ご希望の時間帯はありますか？${i===0?" 必須":""}</div>${dateTimeOption(i,"午前")}${dateTimeOption(i,"午後（最終受付16時30分）")}${dateTimeOption(i,"時間帯の希望なし")}`}
function stepReserve(){return `${errorHtml()}<div class="question-title">ご予約希望日について教えてください</div><div class="category">【予約日について】</div>${radio("reserveType","希望あり")}${radio("reserveType","最短日希望")}${data.reserveType==="希望あり"?`${dateBlock(0)}${dateBlock(1)}${dateBlock(2)}`:""}${data.reserveType==="最短日希望"?`<div class="category">【ご都合のつきやすい時間帯】必須</div>${checkbox("openTime","午前")}${checkbox("openTime","午後（最終受付16時30分）")}${checkbox("openTime","時間帯の希望なし")}${checkbox("openTime","詳細時間あり")}${data.openTime.includes("詳細時間あり")?`<div class="row-gap"></div><input type="text" placeholder="例：15時以降、午前早め希望など" value="${data.detailTime}" oninput="data.detailTime=this.value">`:""}`:""}<div class="buttons"><button class="secondary" onclick="back()">戻る</button><button class="primary" onclick="next()">次へ</button></div>`}
function stepPersonal(){return `${errorHtml()}<div class="question-title">ご予約される方について</div><div class="category">【お名前】必須</div><input type="text" placeholder="例：頭痛 治子" value="${data.name}" oninput="data.name=this.value"><div class="category">【電話番号】必須</div><input type="tel" placeholder="例：090-0000-0000" value="${data.phone}" oninput="data.phone=this.value"><div class="buttons"><button class="secondary" onclick="back()">戻る</button><button class="primary" onclick="next()">次へ</button></div>`}
function stepCondition(){return `<div class="question-title">現在のお身体の状態について<br>（複数選択可）</div>${checkbox("concerns","頭痛を繰り返している")}${checkbox("concerns","薬を飲むことが増えている")}${checkbox("concerns","閃輝暗点（視界がチカチカする等）がある")}${checkbox("concerns","病院へ行っても改善しなかった")}${checkbox("concerns","天気や気圧で悪化しやすい")}${checkbox("concerns","首・肩こりが酷い")}${checkbox("concerns","日常生活に支障が出ている")}${checkbox("concerns","頭痛との付き合い方に不安がある")}${checkbox("concerns","生理前後に悪化しやすい")}${checkbox("concerns","子どもの頭痛で悩んでいる")}${checkbox("concerns","その他気になること")}<div class="category">【当院を知ったキッカケ】</div>${sourceRadio("Google検索")}${sourceRadio("Instagram")}${sourceRadio("ご紹介")}${sourceRadio("その他")}${data.source==="その他"?`<div class="row-gap"></div><input type="text" placeholder="その他のきっかけをご記入ください" value="${data.sourceOther}" oninput="data.sourceOther=this.value">`:""}<div class="category">【その他、事前に伝えておきたいこと】</div><p>気になることや、事前に伝えておきたいことがありましたらご記入ください😊</p><textarea placeholder="気になることがありましたらご記入ください😊" oninput="data.note=this.value">${data.note}</textarea><div class="buttons"><button class="secondary" onclick="back()">戻る</button><button class="primary" onclick="next()">確認へ進む</button></div>`}
function makeSummary(){
 const lines=[];lines.push("【Sia-Smile ご予約フォーム】","","■予約日について",data.reserveType||"未選択");
 if(data.reserveType==="希望あり"){data.dates.forEach((d,i)=>lines.push(`第${i+1}希望：${d.date||"未入力"} / ${d.time.length?d.time.join("、"):"時間帯未選択"}`))}
 if(data.reserveType==="最短日希望"){lines.push("希望時間帯："+(data.openTime.length?data.openTime.join("、"):"未選択"));if(data.detailTime)lines.push("詳細時間："+data.detailTime)}
 lines.push("","■お名前",data.name||"未入力","","■電話番号",data.phone||"未入力","","■現在のお身体の状態",data.concerns.length?data.concerns.join("、"):"未選択","","■当院を知ったキッカケ",data.source||"未選択");
 if(data.sourceOther)lines.push("その他："+data.sourceOther);
 lines.push("","■事前に伝えておきたいこと",data.note||"なし");
 return lines.join("\\n")
}
function confirm(){return `<div class="question-title">入力内容をご確認ください😊</div><p>内容にお間違いがなければ、下のボタンから送信してください。</p><div class="summary">${makeSummary()}</div><div class="buttons"><button class="secondary" onclick="back()">戻る</button><button class="primary" onclick="submitForm()">この内容で予約希望を送信する</button></div>`}
function submitForm(){page=5;render()}
function complete(){return `<div class="complete-icon">🌿</div><div class="question-title">ご予約希望を送信しました</div><p>ご入力ありがとうございます😊</p><p>内容を確認後、順番にご連絡させていただきます。</p><p>今しばらくお待ちください🌿</p>`}
render();
</script>
</body>
</html>
